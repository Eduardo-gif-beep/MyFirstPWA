<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Tasks</title>
    <link rel="stylesheet", href="css/styles.css">
</head>

<body>
    <main>

        <div>
            <h1>Task Manager</h1>
            <div id="status" class="online">online</div>
        </div>

        <form id="task-form">
            <input type="text" id="task-input" placeholder="Escribe una tarea">
            <button type="submit" id="add-Task">Agregar</button>
        </form>

        <section>
            <h2>Lista de tareas</h2>
            <ul id="task-list"></ul>
        </section>

    </main>
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>

</html>
