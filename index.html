<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Products</title>
    <link rel="stylesheet", href="css/styles.css">
</head>

<body>
    <main>

        <div>
            <h1>Product Manager</h1>
            <div id="status" class="online">online</div>
        </div>

        <form id="product-form">
            <input type="text" id="product-input" placeholder="Input a product">
            <input type="number" id="product-quantity" placeholder="Quantity">
            <button type="submit" id="add-product">Save</button>
        </form>

        <section>
            <h2>List of Products</h2>
            <ul id="product-list"></ul>
        </section>

    </main>
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>

</html>
